name: CI
on: push
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup CMake
        uses: lukka/get-cmake@v4.3.2
        with:
          cmakeVersion: 4.1.2
          ninjaVersion: 1.13.2 
      - name: Setup CCache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          verbose: 2
      - name: Setup Emscripten toolchain
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 4.0.23
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
      - name: Run CMake
        env:
          EMSCRIPTEN_ROOT: "${{env.EMSDK}}/upstream/emscripten"
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'wasm32-emscripten-clang'
          buildPreset: 'wasm32-emscripten-clang-Release'
          packagePreset: 'wasm32-emscripten-clang-Release'
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          path: 'build/wasm32-emscripten-clang/*.zip'
          archive: false

